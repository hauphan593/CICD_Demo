# Unique name for this workflow
name: Deploy integration branch to integration and staging/uat orgs

# Definition when the workflow should run
on:
    push:
      branches: [ curiousBadger ]
      paths:
        - 'force-app/**'
            

# Jobs to be executed
jobs:
    deploy-branch-to-int-and-staging-orgs:
        runs-on: ubuntu-latest
        if: ${{ github.actor != 'dependabot[bot]' }}
        steps:
            # Install Salesforce CLI
            - name: 'Install Salesforce CLI'
              run: |
                  wget https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.xz
                  mkdir -p ~/cli/sf
                  tar xJf sf-linux-x64.tar.xz -C ~/cli/sf --strip-components 1
                  echo "$HOME/cli/sf/bin" >> $GITHUB_PATH
                  ~/cli/sf/bin/sf version
            - name: Check Node.js version
              run: node -v

            # install SFDX-Git-Delta plugin - https://github.com/scolladon/sfdx-git-delta
            - name: 'Installing sf git delta'
              run: | 
                  echo y | sf plugins:install sfdx-git-delta
                  sf plugins 

            # Checkout the source code
            - name: 'Checkout source code'
              uses: actions/checkout@v3
              with:
                fetch-depth: 0

            # Store secret for both otgs
            - name: 'Populate auth file with SFDX_URL secret of the integration and staging orgs'
              shell: bash
              run: |
                  echo ${{ secrets.SFDX_INTEGRATION_URL}} > ./SFDX_INTEGRATION_URL.txt
                  echo ${{ secrets.SFDX_STAGING_URL}} > ./SFDX_STAGING_URL.txt

            - name: 'Create delta packages for new, modified or deleted metadata'
              run: | 
                  mkdir changed-sources
                  sfdx sgd:source:delta --to "HEAD" --from "HEAD^" --output changed-sources/ --generate-delta --source force-app/

            # Authenticate to org
            - name: 'Authenticate to Integration Org'
              run: sf org login sfdx-url -f ./SFDX_INTEGRATION_URL.txt --set-default --alias integration

            - name: 'Deploy the entire branch to Integration org'
              run: sf project deploy start --source-dir force-app --test-level RunLocalTests --json

            - name: 'Deploy destructive changes (if any) to Integration org'
              run: sf project deploy start --metadata-dir "changed-sources/destructiveChanges" --dry-run --ignore-warnings

            # Authenticate to org
            - name: 'Authenticate to Staging Org to Staging org'
              # run: sfdx auth:sfdxurl:store -f ./SFDX_STAGING_URL.txt -s -a staging
              run: sf org login sfdx-url -f ./SFDX_INTEGRATION_URL.txt --set-default --alias integration
            - name: 'Deploy the entire branch'
              run: sf project deploy start --source-dir force-app --test-level RunLocalTests --json

            - name: 'Deploy destructive changes (if any) to Staging org'
              run: sf project deploy start --metadata-dir "changed-sources/destructiveChanges" --dry-run --ignore-warnings

